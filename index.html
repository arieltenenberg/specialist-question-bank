<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fresh Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #e0e0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 48px 64px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(100, 80, 255, 0.15);
      max-width: 520px;
      width: 90%;
    }

    .dot {
      width: 12px;
      height: 12px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
      margin-bottom: 24px;
      box-shadow: 0 0 12px #4ade80;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 8px #4ade80; }
      50%       { box-shadow: 0 0 20px #4ade80; }
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    p {
      color: #8888aa;
      font-size: 1rem;
      line-height: 1.6;
    }

    .meta {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #2a2a4a;
      font-size: 0.8rem;
      color: #555577;
    }

    .meta span {
      color: #7070aa;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="dot"></div>
    <h1>Hello, World</h1>
    <p>Your fresh EC2 webpage is live and running.</p>
    <div class="meta">
      Served from <span>EC2</span> &middot; Port <span>8080</span> &middot;
      <span id="ts"></span>
    </div>
  </div>
  <script>
    const el = document.getElementById('ts');
    const fmt = () => el.textContent = new Date().toLocaleTimeString();
    fmt(); setInterval(fmt, 1000);
  </script>
</body>
</html>
